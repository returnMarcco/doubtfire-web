<div class="flex flex-col gap-4">
  <mat-checkbox
    matInput
    required
    [(ngModel)]="taskDefinition.assessmentEnabled"
    [disabled]="!overseerEnabled"
  >
    Automation Enabled
  </mat-checkbox>

  <mat-form-field class="flex-grow" appearance="outline">
    <mat-label>Docker Image</mat-label>
    <mat-select [(value)]="taskDefinition.overseerImageId" [disabled]="!overseerEnabled">
      @for (image of images | async; track image) {
        <mat-option [value]="image.id">{{ image.description }}</mat-option>
      }
    </mat-select>
    <mat-hint>Docker image for Overseer</mat-hint>
  </mat-form-field>

  <f-file-drop
    mode="event"
    (filesDropped)="uploadOverseerResources($event)"
    accept="application/zip,application/x-zip-compressed"
    [desiredFileName]="'Task ' + taskDefinition.abbreviation + ' Overseer zip'"
  />
  @if (taskDefinition.hasTaskAssessmentResources) {
    <div class="flex flex-row gap-4 pt-4">
      <button
        mat-flat-button
        color="warn"
        (click)="removeOverseerResources()"
        class="grow me-4"
      >
        Delete Overseer Resources Zip
      </button>
      <button
        mat-flat-button
        color="accent"
        (click)="downloadOverseerResources()"
        class="grow ms-4"
      >
        Download Overseer Resources Zip
      </button>
    </div>
  }

  <div class="flex flex-row gap-4 pt-4">
    <button
      mat-flat-button
      color="primary"
      [disabled]="!taskDefinition.id || !taskDefinition.hasTaskAssessmentResources"
      (click)="testSubmission()"
      class="flex-grow me-4"
    >
      <mat-icon>upload_file</mat-icon> Test Submission
    </button>
    <button
      mat-flat-button
      color="accent"
      [disabled]="!currentUserTask"
      (click)="testSubmissionHistory()"
      class="flex-grow ms-4"
    >
      <mat-icon>preview</mat-icon> Submission History
    </button>
  </div>
</div>
